name: Build Android APK
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build web assets and sync to Android
        run: npm run build
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      - name: Ensure Gradle Wrapper is valid
        run: |
          JAR_PATH="android/gradle/wrapper/gradle-wrapper.jar"
          VALID=true
          if [ ! -f "$JAR_PATH" ] || [ ! -s "$JAR_PATH" ]; then
            VALID=false
          elif ! unzip -t "$JAR_PATH" >/dev/null 2>&1; then
            VALID=false
          fi
          
          if [ "$VALID" = false ]; then
            echo "⚠️ Gradle wrapper JAR is missing or corrupted! Downloading a clean one..."
            mkdir -p android/gradle/wrapper
            curl -L -s -S -o "$JAR_PATH" https://raw.githubusercontent.com/spring-projects/spring-boot/main/gradle/wrapper/gradle-wrapper.jar
          else
            echo "✅ Gradle wrapper JAR is valid."
          fi
      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayZone-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: APK build summary
        run: |
          echo "✅ APK built successfully!"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
